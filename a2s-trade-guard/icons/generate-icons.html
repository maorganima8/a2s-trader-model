<!DOCTYPE html>
<html>
<head><title>Generate A2s Icons</title></head>
<body>
<p>Open this file in a browser, right-click each canvas, and "Save image as" to get the PNG icons.</p>

<h3>16x16</h3>
<canvas id="c16" width="16" height="16"></canvas>

<h3>48x48</h3>
<canvas id="c48" width="48" height="48"></canvas>

<h3>128x128</h3>
<canvas id="c128" width="128" height="128"></canvas>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  // Background circle
  ctx.fillStyle = '#18181b';
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI * 2);
  ctx.fill();

  // Shield shape
  ctx.fillStyle = '#eab308';
  ctx.beginPath();
  const cx = s/2, cy = s * 0.48;
  const w = s * 0.35, h = s * 0.4;
  ctx.moveTo(cx, cy - h);
  ctx.lineTo(cx + w, cy - h * 0.5);
  ctx.lineTo(cx + w * 0.8, cy + h * 0.6);
  ctx.lineTo(cx, cy + h);
  ctx.lineTo(cx - w * 0.8, cy + h * 0.6);
  ctx.lineTo(cx - w, cy - h * 0.5);
  ctx.closePath();
  ctx.fill();

  // Checkmark inside shield
  if (s >= 48) {
    ctx.strokeStyle = '#18181b';
    ctx.lineWidth = s * 0.06;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - w*0.3, cy);
    ctx.lineTo(cx - w*0.05, cy + h*0.25);
    ctx.lineTo(cx + w*0.3, cy - h*0.2);
    ctx.stroke();
  }
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body>
</html>
